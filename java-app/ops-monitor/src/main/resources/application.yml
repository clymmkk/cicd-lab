spring:
  application:
    name: ops-monitor
  datasource:
    url: jdbc:mysql://localhost:3306/ops_monitor?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

jwt:
  secret: ops-monitor-jwt-secret-key-2024-change-in-production
  expiration: 86400000

cors:
  allowed-origins: "http://localhost:5173"
