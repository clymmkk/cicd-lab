services:
  mysql:
    image: mysql:8.0.39
    container_name: ops-fault-lab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: fault_lab
      MYSQL_USER: faultlab
      MYSQL_PASSWORD: faultlab123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2-alpine
    container_name: ops-fault-lab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: ops-fault-lab-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: fault_lab
      DB_USERNAME: faultlab
      DB_PASSWORD: faultlab123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ops-fault-lab-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
